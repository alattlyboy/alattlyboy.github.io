<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线答题练习系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📝 在线答题练习系统</h1>
        </div>

        <!-- 题目配置页面 -->
        <div id="configPage">
            <div class="config-section">
                <div class="config-header">
                    <div class="config-title">📋 题目管理</div>
                    <div class="config-actions">
                        <button class="btn btn-primary" onclick="importJsonFile()">📁 导入JSON文件</button>
                        <button class="btn btn-success" onclick="exportJsonFile()">💾 导出JSON文件</button>
                        <button class="btn btn-secondary" onclick="loadDemo()">🎯 加载示例</button>
                    </div>
                </div>

                <!-- 题目列表 -->
                <div class="question-list" id="questionList"></div>

                <!-- 添加题目表单 -->
                <div class="add-question-form" id="addForm">
                    <div class="form-title">➕ 添加/编辑题目</div>
                    <div class="form-row">
                        <label>题型</label>
                        <select id="formType" onchange="onTypeChange()">
                            <option value="single">单选题</option>
                            <option value="multi">多选题</option>
                            <option value="judge">判断题</option>
                            <option value="fill">填空题</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>题目内容</label>
                        <textarea id="formTitle" placeholder="请输入题目内容，填空题用 ____ 表示填空位置"></textarea>
                    </div>
                    <div class="form-row" id="formOptionsRow">
                        <label>选项（每行一个）</label>
                        <textarea id="formOptions" placeholder="选项A&#10;选项B&#10;选项C&#10;选项D"></textarea>
                    </div>
                    <div class="form-row">
                        <label>正确答案</label>
                        <input type="text" id="formAnswer" placeholder="单选填A/B/C/D，多选填A,C,D，判断填A(对)或B(错)，填空填答案">
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveQuestion()">💾 保存题目</button>
                        <button class="btn btn-secondary" onclick="cancelEdit()">❌ 取消</button>
                    </div>
                </div>

                <div class="btn-group" style="margin-top:20px;">
                    <button class="btn btn-success btn-large" onclick="startQuiz()" id="startBtn" style="display:none;">🚀 开始答题</button>
                </div>
            </div>
        </div>

        <!-- 答题页面 -->
        <div id="quizPage" style="display:none;">
            <!-- 统计面板 -->
            <div class="stats-panel" id="statsPanel">
                <div class="score-display">
                    <div class="score-number" id="scoreNumber">0</div>
                    <div class="score-label">分</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-num" id="correctNum">0</div>
                        <div class="stat-label">✓ 答对</div>
                    </div>
                    <div class="stat-item wrong-stat">
                        <div class="stat-num" id="wrongNum">0</div>
                        <div class="stat-label">✗ 答错</div>
                    </div>
                    <div class="stat-item total-stat">
                        <div class="stat-num" id="totalNum">0</div>
                        <div class="stat-label">📊 总计</div>
                    </div>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-header">
                    <span class="progress-title">答题进度</span>
                    <span class="progress-count" id="progressCount">0/0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- 题目导航 -->
            <div class="nav-section" id="navSection">
                <div class="nav-title">🔢 题目导航（点击跳转）</div>
                <div class="nav-grid" id="navGrid"></div>
            </div>

            <!-- 题目容器 -->
            <div id="questionsContainer"></div>

            <!-- 按钮组 -->
            <div class="btn-group" id="actionButtons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">⬅ 上一题</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题 ➡</button>
                <button class="btn btn-success" id="submitBtn" onclick="submitAll()">✅ 提交答案</button>
                <button class="btn btn-danger" id="resetBtn" onclick="resetQuiz()" style="display:none;">🔄 重新答题</button>
            </div>

            <div class="btn-group" style="margin-top:15px;">
                <button class="btn btn-secondary" onclick="backToConfig()">🔙 返回题目管理</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="handleFileSelect(event)">

    <script src="app.js"></script>
</body>
</html>
