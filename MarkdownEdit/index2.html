<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 编辑器（永不崩溃版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#f5f7fa}
.layout{display:flex;height:100vh}

/* 左侧：文件 + 大纲 */
.left{width:270px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column}
.tab-bar{display:flex;border-bottom:1px solid #ddd}
.tab{flex:1;padding:14px 0;text-align:center;cursor:pointer;font-weight:500}
.tab.active{color:#409eff;border-bottom:2px solid #409eff}
.panel{flex:1;overflow-y:auto;padding:10px}
.panel{display:none}
.panel.active{display:block}

.file-item{padding:9px 12px;border-radius:6px;margin-bottom:4px;cursor:pointer}
.file-item:hover{background:#f0f7ff}
.file-item.active{background:#409eff;color:#fff}

.outline-item{padding:7px 12px;color:#333;cursor:pointer}
.outline-h1{padding-left:14px;font-weight:600}
.outline-h2{padding-left:28px}
.outline-h3{padding-left:42px}
.outline-h4{padding-left:56px;color:#666}
.outline-h5{padding-left:70px;color:#777}
.outline-h6{padding-left:84px;color:#888}

/* 中间：编辑 */
.center{flex:1;display:flex;flex-direction:column;padding:20px}

/* 右侧：预览 默认隐藏 */
.right{
  flex:1;display:flex;flex-direction:column;padding:20px;border-left:1px solid #ddd;
  display:none; /* 默认不显示 */
}
.right.show{display:flex}

.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn{padding:8px 14px;background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-gray{background:#888}

#editor{
  flex:1;background:#fff;border:1px solid #ddd;border-radius:8px;padding:20px;
  font-size:15px;outline:none;resize:none;line-height:1.7;
  white-space:pre-wrap;overflow-y:auto;
}
#preview{
  flex:1;background:#fff;border:1px solid #ddd;border-radius:8px;padding:20px;
  line-height:1.7;overflow-y:auto;
}

/* 手机适配 */
@media(max-width:768px){
  .layout{flex-direction:column}
  .left{width:100%;height:auto}
}
</style>
</head>

<body>
<div class="layout">
  <div class="left">
    <div class="tab-bar">
      <div class="tab active" data-panel="file">📂 文件</div>
      <div class="tab" data-panel="outline">📌 大纲</div>
    </div>
    <div id="file" class="panel active">
      <div class="file-item active" data-name="笔记.md">笔记.md</div>
    </div>
    <div id="outline" class="panel"></div>
  </div>

  <div class="center">
    <div class="toolbar">
      <button class="btn" id="previewBtn">👁 预览</button>
      <button class="btn" id="import">导入 .md</button>
      <button class="btn" id="export">导出 .md</button>
      <button class="btn btn-gray" id="new">新建</button>
      <input type="file" id="file-input" accept=".md" style="display:none">
    </div>
    <textarea id="editor" placeholder="编写 Markdown..."></textarea>
  </div>

  <div class="right" id="rightPanel">
    <div style="font-weight:600;margin-bottom:10px">👁 预览区域</div>
    <div id="preview"></div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const rightPanel = document.getElementById('rightPanel');
const previewBtn = document.getElementById('previewBtn');
const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.panel');
const filePanel = document.getElementById('file');
const outlinePanel = document.getElementById('outline');
const importBtn = document.getElementById('import');
const exportBtn = document.getElementById('export');
const newBtn = document.getElementById('new');
const fileInput = document.getElementById('file-input');

let files = { '笔记.md': '# 一级标题\n## 二级标题\n### 三级标题\n#### 四级标题\n##### 五级标题\n###### 六级标题' };
let currentFile = '笔记.md';

// 预览按钮点击切换显示/隐藏
previewBtn.addEventListener('click', () => {
  rightPanel.classList.toggle('show');
  renderAll(); // 显示时立即渲染
});

// 切换标签
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t=>t.classList.remove('active'));
    panels.forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

loadFile(currentFile);

// 输入 = 实时预览（只有打开预览才生效）
editor.addEventListener('input', () => {
  const text = editor.value;
  files[currentFile] = text;
  if(rightPanel.classList.contains('show')){
    renderAll();
  }
  makeOutline(text);
});

// 导入
importBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    const n = f.name; files[n] = r.result; addFile(n); loadFile(n);
  };
  r.readAsText(f);
});

// 导出
exportBtn.addEventListener('click', () => {
  const blob = new Blob([editor.value], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFile;
  a.click();
});

// 新建
newBtn.addEventListener('click', () => {
  const n = prompt('文件名','新文档.md'); if(!n) return;
  files[n] = `# ${n.replace('.md','')}`; addFile(n); loadFile(n);
});

// 加载文件
function loadFile(name) {
  currentFile = name;
  editor.value = files[name];
  if(rightPanel.classList.contains('show')) renderAll();
  makeOutline(editor.value);
  document.querySelectorAll('.file-item').forEach(i=>i.classList.remove('active'));
  document.querySelector(`[data-name="${name}"]`).classList.add('active');
}

function addFile(name) {
  const d = document.createElement('div');
  d.className='file-item'; d.dataset.name=name; d.textContent=name;
  d.onclick = ()=>loadFile(name);
  filePanel.appendChild(d);
}

// 渲染预览 + 大纲
function renderAll() {
  const t = editor.value;
  preview.innerHTML = renderMarkdown(t);
}

// 支持 6 级标题渲染 + ~~~ 代码块
function renderMarkdown(text) {
  return text
    .replace(/^###### (.*)/gim,'<h6>$1</h6>')
    .replace(/^##### (.*)/gim,'<h5>$1</h5>')
    .replace(/^#### (.*)/gim,'<h4>$1</h4>')
    .replace(/^### (.*)/gim,'<h3>$1</h3>')
    .replace(/^## (.*)/gim,'<h2>$1</h2>')
    .replace(/^# (.*)/gim,'<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/gim,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/gim,'<em>$1</em>')
    .replace(/^> (.*)/gim,'<blockquote style="padding-left:14px;border-left:3px solid #409eff;color:#555">$1</blockquote>')
    .replace(/^- (.*)/gim,'<li>$1</li>')
    .replace(/^\d+\. (.*)/gim,'<li>$1</li>')
    
    // 支持 ``` 和 ~~~ 两种代码块
    .replace(/```([\s\S]*?)```/gim,'<pre><code style="background:#f6f8fa;padding:10px;display:block">$1</code></pre>')
    .replace(/~~~([\s\S]*?)~~~/gim,'<pre><code style="background:#f6f8fa;padding:10px;display:block">$1</code></pre>')
    
    .replace(/`(.*?)`/gim,'<code style="background:#f6f8fa">$1</code>')
    .replace(/\[(.*?)\]\((.*?)\)/gim,'<a href="$2">$1</a>')
    .replace(/!\[(.*?)\]\((.*?)\)/gim,'<img src="$2" style="max-width:100%">')
    .replace(/\n/gim,'<br>');
}

// 6 级大纲 + 点击跳转
function makeOutline(text) {
  outlinePanel.innerHTML = '';
  const lines = text.split('\n');
  lines.forEach((line, idx) => {
    let clz, txt;
    if(line.startsWith('# ')) {
      clz='outline-h1'; txt=line.replace(/# /g,'');
    } else if(line.startsWith('## ')) {
      clz='outline-h2'; txt=line.replace(/## /g,'');
    } else if(line.startsWith('### ')) {
      clz='outline-h3'; txt=line.replace(/### /g,'');
    } else if(line.startsWith('#### ')) {
      clz='outline-h4'; txt=line.replace(/#### /g,'');
    } else if(line.startsWith('##### ')) {
      clz='outline-h5'; txt=line.replace(/##### /g,'');
    } else if(line.startsWith('###### ')) {
      clz='outline-h6'; txt=line.replace(/###### /g,'');
    } else return;

    const d = document.createElement('div');
    d.className='outline-item '+clz;
    d.textContent=txt;
    d.onclick=()=>jumpToLine(idx);
    outlinePanel.appendChild(d);
  });
}

// 大纲跳转
function jumpToLine(idx) {
  const lines = editor.value.split('\n');
  let pos = 0;
  for(let i=0;i<idx;i++) pos += lines[i].length + 1;
  editor.focus();
  editor.setSelectionRange(pos, pos);
}
</script>
</body>
</html>
