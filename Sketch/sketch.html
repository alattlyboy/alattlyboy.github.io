max-width: 100%;

        .Prompt‌{
        width: 100%;

<body>
    <div class="title">🎨 照片转素描工具</div>
   <div class="Prompt‌">提示：⚠️本产品不具有上传功能一切皆在本地运行，可放心使用</div>
    <div class="btn-area">
        <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">
            📁 上传图片
        </button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadImage()" disabled>
            💾 下载素描图
        </button>
        <button class="btn btn-clear" onclick="clearAll()">
            🗑️ 清空
        </button>
        <button class="btn btn-gallery" onclick="openGallery()">
            🖼️ 查看图库
        </button>
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">

    <div class="param-area">
        <label>模糊强度:</label>
        <div class="slider-container">
            <input type="range" id="blurSlider" min="1" max="100" value="19" oninput="updateBlurValue(this.value)">
            <span class="blur-value" id="blurValue">19</span>
        </div>
        <button class="btn btn-apply" onclick="reapplySketch()">应用</button>
    </div>

    <div class="display-area">
        <div class="img-box" id="originalBox">
            <div class="img-box-title">原图预览</div>
            <div class="placeholder-text" id="originalPlaceholder">
                暂无图片<br>点击上方按钮上传
            </div>
            <canvas id="originalCanvas" class="hidden-canvas"></canvas>
        </div>

        <div class="arrow">➡️</div>

        <div class="img-box" id="resultBox">
            <div class="img-box-title">素描结果预览</div>
            <div class="placeholder-text" id="resultPlaceholder">
                处理后的素描图<br>将显示在这里
            </div>
            <canvas id="resultCanvas" class="hidden-canvas"></canvas>
        </div>
    </div>

    <div class="status-bar" id="statusBar">就绪 - 请上传图片</div>

    </div>

    <!-- 图库弹窗 -->
    <div class="gallery-overlay" id="galleryOverlay">
        <div class="gallery-modal">
            <div class="gallery-header">
                <h2>🖼️ 图片图库</h2>
                <div class="gallery-actions">
                    <button class="btn-clear-db" id="clearDbBtn" onclick="showClearConfirm()">
                        🗑️ 清空当前数据
                    </button>
                    <button class="gallery-close" onclick="closeGallery()">&times;</button>
                </div>
            </div>
            <div class="gallery-tabs">
                <button class="gallery-tab active" onclick="switchTab('input')" id="tabInput">📁 导入图片 (Input)</button>
                <button class="gallery-tab" onclick="switchTab('output')" id="tabOutput">💾 下载图片 (Output)</button>
            </div>
            <div class="gallery-content" id="galleryContent">
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-modal">
            <h3>⚠️ 确认清空</h3>
            <p id="confirmText">确定要清空当前分类的所有数据吗？此操作不可恢复！</p>
            <div class="confirm-btns">
                <button class="confirm-btn confirm-btn-cancel" onclick="hideClearConfirm()">取消</button>
                <button class="confirm-btn confirm-btn-confirm" onclick="executeClear()">确认清空</button>
            </div>
        </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div class="preview-overlay" id="previewOverlay" onclick="closePreview()">
        <button class="preview-close">&times;</button>
        <img class="preview-img" id="previewImg" src="" alt="预览">
    </div>

    <script>
        let originalImageData = null;
        let originalFileName = '';
        let sketchImageData = null;
        let originalWidth = 0;
        let originalHeight = 0;
        

        // IndexedDB 数据库
        let db = null;
        const DB_NAME = 'SketchToolDB';
        const DB_VERSION = 1;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('input')) {
                        database.createObjectStore('input', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!database.objectStoreNames.contains('output')) {
                        database.createObjectStore('output', { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }

        // 保存图片到 IndexedDB
        function saveImage(storeName, fileName, dataUrl) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const data = {
                    fileName: fileName,
                    dataUrl: dataUrl,
                    timestamp: new Date().toISOString()
                };
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // 获取所有图片
        function getAllImages(storeName) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // 删除单张图片
        function deleteImage(storeName, id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // 清空整个存储
        function clearStore(storeName) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function updateBlurValue(val) {
            document.getElementById('blurValue').textContent = val;
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalWidth = img.width;
                    originalHeight = img.height;
                    originalFileName = file.name;

                    const origCanvas = document.getElementById('originalCanvas');
                    origCanvas.width = originalWidth;
                    origCanvas.height = originalHeight;
                    const origCtx = origCanvas.getContext('2d');
                    origCtx.drawImage(img, 0, 0);

                    originalImageData = origCtx.getImageData(0, 0, originalWidth, originalHeight);

                    showCanvas('originalCanvas', 'originalPlaceholder');

                    // 保存到 input 存储
                    const dataUrl = origCanvas.toDataURL('image/png');
                    saveImage('input', file.name, dataUrl).then(() => {
                        document.getElementById('statusBar').textContent = 
                            `已加载: ${file.name} | 尺寸: ${originalWidth}x${originalHeight} | 已保存到 Input`;
                    }).catch(err => {
                        console.error('保存失败:', err);
                        document.getElementById('statusBar').textContent = 
                            `已加载: ${file.name} | 尺寸: ${originalWidth}x${originalHeight}`;
                    });

                    generateSketch();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showCanvas(canvasId, placeholderId) {
            document.getElementById(canvasId).classList.remove('hidden-canvas');
            document.getElementById(placeholderId).style.display = 'none';
        }

        function hideCanvas(canvasId, placeholderId) {
            document.getElementById(canvasId).classList.add('hidden-canvas');
            document.getElementById(placeholderId).style.display = 'block';
        }

        // ========== 纯 JS 高斯模糊实现（完全还原 OpenCV GaussianBlur）==========

        function getGaussianKernel(size, sigma) {
            const kernel = [];
            const center = (size - 1) / 2;
            let sum = 0;
            for (let i = 0; i < size; i++) {
                const x = i - center;
                const val = Math.exp(-(x * x) / (2 * sigma * sigma));
                kernel.push(val);
                sum += val;
            }
            for (let i = 0; i < size; i++) {
                kernel[i] /= sum;
            }
            return kernel;
        }

        function gaussianBlur(srcData, width, height, kernelSize) {
            const sigma = 0.3 * ((kernelSize - 1) * 0.5 - 1) + 0.8;
            const kernel = getGaussianKernel(kernelSize, sigma);
            const half = Math.floor(kernelSize / 2);

            const temp = new Float32Array(width * height);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let sum = 0;
                    for (let k = 0; k < kernelSize; k++) {
                        const px = x + k - half;
                        const clampedX = Math.max(0, Math.min(width - 1, px));
                        sum += srcData[y * width + clampedX] * kernel[k];
                    }
                    temp[y * width + x] = sum;
                }
            }

            const dst = new Float32Array(width * height);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let sum = 0;
                    for (let k = 0; k < kernelSize; k++) {
                        const py = y + k - half;
                        const clampedY = Math.max(0, Math.min(height - 1, py));
                        sum += temp[clampedY * width + x] * kernel[k];
                    }
                    dst[y * width + x] = sum;
                }
            }

            return dst;
        }

        function generateSketch() {
            if (!originalImageData) return;

            const w = originalWidth;
            const h = originalHeight;
            const totalPixels = w * h;
            const origData = originalImageData.data;

            const gray = new Uint8Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                const idx = i * 4;
                gray[i] = 0.114 * origData[idx] + 0.587 * origData[idx + 1] + 0.299 * origData[idx + 2];
            }

            const invGray = new Uint8Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                invGray[i] = 255 - gray[i];
            }

            let blurVal = parseInt(document.getElementById('blurSlider').value);
            if (blurVal % 2 === 0) blurVal += 1;

            const blurred = gaussianBlur(invGray, w, h, blurVal);

            const invBlurred = new Float32Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                invBlurred[i] = 255 - blurred[i];
            }

            const sketch = new Uint8Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                const grayVal = gray[i];
                const invBlurVal = invBlurred[i];
                let sketchVal;
                if (invBlurVal <= 0) {
                    sketchVal = 255;
                } else {
                    sketchVal = Math.min(255, (grayVal / invBlurVal) * 256.0);
                }
                sketch[i] = sketchVal;
            }

            const resultCanvas = document.getElementById('resultCanvas');
            resultCanvas.width = w;
            resultCanvas.height = h;
            const resultCtx = resultCanvas.getContext('2d');
            const resultImgData = resultCtx.createImageData(w, h);
            const resultData = resultImgData.data;

            for (let i = 0; i < totalPixels; i++) {
                const idx = i * 4;
                const val = sketch[i];
                resultData[idx] = val;
                resultData[idx + 1] = val;
                resultData[idx + 2] = val;
                resultData[idx + 3] = 255;
            }
            resultCtx.putImageData(resultImgData, 0, 0);

            sketchImageData = resultImgData;
            showCanvas('resultCanvas', 'resultPlaceholder');

            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('statusBar').textContent = '素描生成完成';
        }

        function reapplySketch() {
            if (originalImageData) {
                generateSketch();
                document.getElementById('statusBar').textContent = '已重新应用参数';
            }
        }

        function downloadImage() {
            if (!sketchImageData) {
                alert('没有可下载的图片！');
                return;
            }

            const resultCanvas = document.getElementById('resultCanvas');
            const dataUrl = resultCanvas.toDataURL('image/png');
            const downloadName = 'sketch_' + originalFileName.replace(/\.[^/.]+$/, '') + '.png';

            // 保存到 output 存储
            saveImage('output', downloadName, dataUrl).then(() => {
                // 浏览器下载
                const link = document.createElement('a');
                link.download = downloadName;
                link.href = dataUrl;
                link.click();

                document.getElementById('statusBar').textContent = '已保存到 Output 并下载: ' + downloadName;
            }).catch(err => {
                console.error('保存失败:', err);
                // 仍然执行浏览器下载
                const link = document.createElement('a');
                link.download = downloadName;
                link.href = dataUrl;
                link.click();
                document.getElementById('statusBar').textContent = '已下载: ' + downloadName;
            });
        }

        function clearAll() {
            originalImageData = null;
            sketchImageData = null;
            originalFileName = '';
            originalWidth = 0;
            originalHeight = 0;

            hideCanvas('originalCanvas', 'originalPlaceholder');
            hideCanvas('resultCanvas', 'resultPlaceholder');

            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('statusBar').textContent = '就绪 - 请上传图片';
            document.getElementById('fileInput').value = '';
        }

        // ========== 图库功能 ==========
        let currentTab = 'input';

        function openGallery() {
            document.getElementById('galleryOverlay').classList.add('active');
            loadGallery(currentTab);
        }

        

        

        function closeGallery() {
            document.getElementById('galleryOverlay').classList.remove('active');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            loadGallery(tab);
        }

        async function loadGallery(tab) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '<div class="gallery-empty">加载中...</div>';

            try {
                const images = await getAllImages(tab);
                if (images.length === 0) {
                    grid.innerHTML = '<div class="gallery-empty">暂无图片<br>请先上传或下载图片</div>';
                    return;
                }

                grid.innerHTML = '';
                images.reverse().forEach(img => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${img.dataUrl}" alt="${img.fileName}" onclick="previewImage('${img.dataUrl}')">
                        <div class="gallery-item-info">
                            ${img.fileName}<br>
                            <small>${new Date(img.timestamp).toLocaleString()}</small>
                        </div>
                    `;
                    grid.appendChild(item);
                });
            } catch (err) {
                console.error('加载图库失败:', err);
                grid.innerHTML = '<div class="gallery-empty">加载失败，请刷新重试</div>';
            }
        }

        function previewImage(dataUrl) {
            document.getElementById('previewImg').src = dataUrl;
            document.getElementById('previewOverlay').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewOverlay').classList.remove('active');
        }

        // ========== 清空 IndexedDB 功能 ==========
        function showClearConfirm() {
            const tabName = currentTab === 'input' ? '导入图片 (Input)' : '下载图片 (Output)';
            document.getElementById('confirmText').textContent = 
                `确定要清空「${tabName}」分类的所有数据吗？此操作不可恢复！`;
            document.getElementById('confirmOverlay').classList.add('active');
        }

        function hideClearConfirm() {
            document.getElementById('confirmOverlay').classList.remove('active');
        }

        async function executeClear() {
            const btn = document.getElementById('clearDbBtn');
            btn.disabled = true;
            btn.textContent = '清空中...';

            try {
                await clearStore(currentTab);
                document.getElementById('statusBar').textContent = 
                    `已清空 ${currentTab === 'input' ? '导入图片' : '下载图片'} 数据`;
                hideClearConfirm();
                loadGallery(currentTab);
            } catch (err) {
                console.error('清空失败:', err);
                alert('清空失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🗑️ 清空当前数据';
            }
        }

        // 初始化数据库
        initDB().then(() => {
            console.log('数据库初始化成功');
        }).catch(err => {
            console.error('数据库初始化失败:', err);
        });
    </script>
</body>
</html>
