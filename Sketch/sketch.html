<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 照片转素描工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333333;
            margin: 20px 0;
            text-align: center;
        }

        .btn-area {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 24px;
            cursor: pointer;
            transition: opacity 0.2s;
            min-width: 140px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-upload {
            background: #4CAF50;
        }

        .btn-download {
            background: #2196F3;
        }

        .btn-download:disabled {
            background: #90CAF9;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f44336;
        }

        .display-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .img-box {
            width: 450px;
            height: 450px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .img-box-title {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 10;
        }

        .img-box canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .placeholder-text {
            color: #666;
            font-size: 16px;
            text-align: center;
            line-height: 1.6;
        }

        .arrow {
            font-size: 30px;
            color: #666;
        }

        .param-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            background: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .param-area label {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            width: 200px;
            cursor: pointer;
        }

        .blur-value {
            font-size: 14px;
            color: #666;
            min-width: 30px;
        }

        .btn-apply {
            background: #FF9800;
            min-width: 80px;
            height: 36px;
            padding: 0 16px;
        }

        .status-bar {
            width: 100%;
            max-width: 1000px;
            padding: 10px 20px;
            font-size: 13px;
            color: #666;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            margin-top: auto;
        }

        #fileInput {
            display: none;
        }

        .hidden-canvas {
            display: none;
        }

        @media (max-width: 1000px) {
            .img-box {
                width: 90vw;
                height: 90vw;
                max-width: 450px;
                max-height: 450px;
            }
            .arrow {
                transform: rotate(90deg);
            }
            .display-area {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="title">🎨 照片转素描工具</div>

    <div class="btn-area">
        <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">
            📁 上传图片
        </button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadImage()" disabled>
            💾 下载素描图
        </button>
        <button class="btn btn-clear" onclick="clearAll()">
            🗑️ 清空
        </button>
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">

    <div class="param-area">
        <label>模糊强度:</label>
        <div class="slider-container">
            <input type="range" id="blurSlider" min="1" max="50" value="19" oninput="updateBlurValue(this.value)">
            <span class="blur-value" id="blurValue">19</span>
        </div>
        <button class="btn btn-apply" onclick="reapplySketch()">应用</button>
    </div>

    <div class="display-area">
        <div class="img-box" id="originalBox">
            <div class="img-box-title">原图预览</div>
            <div class="placeholder-text" id="originalPlaceholder">
                暂无图片<br>点击上方按钮上传
            </div>
            <canvas id="originalCanvas" class="hidden-canvas"></canvas>
        </div>

        <div class="arrow">➡️</div>

        <div class="img-box" id="resultBox">
            <div class="img-box-title">素描结果预览</div>
            <div class="placeholder-text" id="resultPlaceholder">
                处理后的素描图<br>将显示在这里
            </div>
            <canvas id="resultCanvas" class="hidden-canvas"></canvas>
        </div>
    </div>

    <div class="status-bar" id="statusBar">就绪 - 请上传图片</div>

    <script>
        let originalImageData = null;
        let originalFileName = '';
        let sketchImageData = null;
        let originalWidth = 0;
        let originalHeight = 0;

        function updateBlurValue(val) {
            document.getElementById('blurValue').textContent = val;
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalWidth = img.width;
                    originalHeight = img.height;
                    originalFileName = file.name;

                    const origCanvas = document.getElementById('originalCanvas');
                    origCanvas.width = originalWidth;
                    origCanvas.height = originalHeight;
                    const origCtx = origCanvas.getContext('2d');
                    origCtx.drawImage(img, 0, 0);
                    
                    originalImageData = origCtx.getImageData(0, 0, originalWidth, originalHeight);
                    
                    showCanvas('originalCanvas', 'originalPlaceholder');
                    
                    document.getElementById('statusBar').textContent = 
                        `已加载: ${file.name} | 尺寸: ${originalWidth}x${originalHeight}`;

                    generateSketch();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showCanvas(canvasId, placeholderId) {
            document.getElementById(canvasId).classList.remove('hidden-canvas');
            document.getElementById(placeholderId).style.display = 'none';
        }

        function hideCanvas(canvasId, placeholderId) {
            document.getElementById(canvasId).classList.add('hidden-canvas');
            document.getElementById(placeholderId).style.display = 'block';
        }

        // ========== 纯 JS 高斯模糊实现（完全还原 OpenCV GaussianBlur）==========

        // 生成高斯核（一维，可分离）
        function getGaussianKernel(size, sigma) {
            const kernel = [];
            const center = (size - 1) / 2;
            let sum = 0;
            for (let i = 0; i < size; i++) {
                const x = i - center;
                const val = Math.exp(-(x * x) / (2 * sigma * sigma));
                kernel.push(val);
                sum += val;
            }
            // 归一化
            for (let i = 0; i < size; i++) {
                kernel[i] /= sum;
            }
            return kernel;
        }

        // 可分离高斯模糊：先水平后垂直
        function gaussianBlur(srcData, width, height, kernelSize) {
            // OpenCV sigma 计算: sigma = 0.3*((ksize-1)*0.5 - 1) + 0.8
            const sigma = 0.3 * ((kernelSize - 1) * 0.5 - 1) + 0.8;
            const kernel = getGaussianKernel(kernelSize, sigma);
            const half = Math.floor(kernelSize / 2);

            // 第一步：水平模糊
            const temp = new Float32Array(width * height);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let sum = 0;
                    for (let k = 0; k < kernelSize; k++) {
                        const px = x + k - half;
                        const clampedX = Math.max(0, Math.min(width - 1, px));
                        sum += srcData[y * width + clampedX] * kernel[k];
                    }
                    temp[y * width + x] = sum;
                }
            }

            // 第二步：垂直模糊
            const dst = new Float32Array(width * height);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let sum = 0;
                    for (let k = 0; k < kernelSize; k++) {
                        const py = y + k - half;
                        const clampedY = Math.max(0, Math.min(height - 1, py));
                        sum += temp[clampedY * width + x] * kernel[k];
                    }
                    dst[y * width + x] = sum;
                }
            }

            return dst;
        }

        // ========== 核心素描算法 ==========
        function generateSketch() {
            if (!originalImageData) return;

            const w = originalWidth;
            const h = originalHeight;
            const totalPixels = w * h;
            const origData = originalImageData.data;

            // 1. 灰度转换 (COLOR_BGR2GRAY)
            const gray = new Uint8Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                const idx = i * 4;
                // BGR to Gray
                gray[i] = 0.114 * origData[idx] + 0.587 * origData[idx + 1] + 0.299 * origData[idx + 2];
            }

            // 2. 反转灰度图 (255 - gray)
            const invGray = new Uint8Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                invGray[i] = 255 - gray[i];
            }

            // 3. 高斯模糊 (cv2.GaussianBlur) - 纯 JS 实现
            let blurVal = parseInt(document.getElementById('blurSlider').value);
            if (blurVal % 2 === 0) blurVal += 1;

            const blurred = gaussianBlur(invGray, w, h, blurVal);

            // 4. 反转模糊图 (255 - blurred)
            const invBlurred = new Float32Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                invBlurred[i] = 255 - blurred[i];
            }

            // 5. cv2.divide(gray, inverted_blurred, scale=256.0)
            // sketch = min(255, gray / invBlur * 256)
            const sketch = new Uint8Array(totalPixels);
            for (let i = 0; i < totalPixels; i++) {
                const grayVal = gray[i];
                const invBlurVal = invBlurred[i];

                let sketchVal;
                if (invBlurVal <= 0) {
                    sketchVal = 255;
                } else {
                    sketchVal = Math.min(255, (grayVal / invBlurVal) * 256.0);
                }
                sketch[i] = sketchVal;
            }

            // 绘制到结果 canvas
            const resultCanvas = document.getElementById('resultCanvas');
            resultCanvas.width = w;
            resultCanvas.height = h;
            const resultCtx = resultCanvas.getContext('2d');
            const resultImgData = resultCtx.createImageData(w, h);
            const resultData = resultImgData.data;

            for (let i = 0; i < totalPixels; i++) {
                const idx = i * 4;
                const val = sketch[i];
                resultData[idx] = val;
                resultData[idx + 1] = val;
                resultData[idx + 2] = val;
                resultData[idx + 3] = 255;
            }
            resultCtx.putImageData(resultImgData, 0, 0);

            sketchImageData = resultImgData;
            showCanvas('resultCanvas', 'resultPlaceholder');

            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('statusBar').textContent = '素描生成完成';
        }

        function reapplySketch() {
            if (originalImageData) {
                generateSketch();
                document.getElementById('statusBar').textContent = '已重新应用参数';
            }
        }

        function downloadImage() {
            if (!sketchImageData) {
                alert('没有可下载的图片！');
                return;
            }

            const resultCanvas = document.getElementById('resultCanvas');
            const link = document.createElement('a');
            link.download = 'sketch_' + originalFileName.replace(/\.[^/.]+$/, '') + '.png';
            link.href = resultCanvas.toDataURL('image/png');
            link.click();

            document.getElementById('statusBar').textContent = '已保存: ' + link.download;
        }

        function clearAll() {
            originalImageData = null;
            sketchImageData = null;
            originalFileName = '';
            originalWidth = 0;
            originalHeight = 0;

            hideCanvas('originalCanvas', 'originalPlaceholder');
            hideCanvas('resultCanvas', 'resultPlaceholder');

            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('statusBar').textContent = '就绪 - 请上传图片';
            document.getElementById('fileInput').value = '';
        }
    </script>
</body>
</html>
